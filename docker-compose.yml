version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: justeat-postgres
    environment:
      POSTGRES_DB: justeat_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - justeat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d justeat_database"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: justeat-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/justeat_database}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-your-email@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your-app-password}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-true}
      SMTP_STARTTLS_REQUIRED: ${SMTP_STARTTLS_REQUIRED:-true}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - justeat-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: justeat-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - justeat-network

volumes:
  postgres-data:

networks:
  justeat-network:
    driver: bridge
